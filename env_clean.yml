name: pimogp_clean
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - ipykernel
  - ipython
  - jupyter_client
  - jupyter_core
  - matplotlib-inline
  - pip
  # core numeric stack via conda (NOT pip)
  - numpy=1.26.4
  - scipy=1.13.1
  - scikit-learn=1.4.2
  - pandas=2.2.3
  - matplotlib=3.8.4
  # whatever else you care about via conda can be listed here too
  - pip:
      - botorch==0.12.0
      - gpytorch==1.13
      - linear-operator==0.5.3
      - pyro-api==0.1.2
      - pyro-ppl==1.9.1
      - torch==2.7.1
      - tqdm==4.66.6
      # keep other pip-only libs if you want:
      - jaxtyping==0.2.19
      - sympy==1.14.0
      - networkx==3.4.2
      # BUT: do NOT put numpy here